name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for proper diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Get PR diff
        id: diff
        run: |
          # Get the diff between base and head
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

          # Also get list of changed files
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed_files.txt

          echo "Files changed:"
          cat changed_files.txt

      - name: Run AI Code Review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Create the review prompt
          cat << 'EOF' > review_prompt.txt
          You are a code review agent. Review the following PR diff for:

          1. Security issues (injection, XSS, secrets, etc.)
          2. Bugs and logic errors
          3. Code quality (unused code, missing validation, etc.)
          4. Best practices and style

          Format your response as markdown with sections:
          - Summary (1-2 sentences)
          - Issues Found (grouped by severity: Critical, Warning, Suggestion)
          - Positive Aspects (if any)
          - Recommendations

          Be concise and actionable. Focus on the most important issues.

          PR Diff:
          EOF

          # Append the diff to the prompt
          cat pr_diff.txt >> review_prompt.txt

          # Run Claude Code and capture output
          claude -p "$(cat review_prompt.txt)" --output-format text > review_output.md 2>&1 || true

          # Check if review was generated
          if [ ! -s review_output.md ]; then
            echo "No review output generated. Check API key and configuration." > review_output.md
          fi

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read the review output
            let review = '';
            try {
              review = fs.readFileSync('review_output.md', 'utf8');
            } catch (error) {
              review = 'Unable to generate review. Please check the workflow logs.';
            }

            // Post comment to PR
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## AI Code Review\n\n${review}\n\n---\n*Powered by Claude Code*`
            });
